<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fps-earth</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e14; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: rgba(8, 10, 16, 0.78); color: #e8ecf3;
      font-family: system-ui, -apple-system, sans-serif;
      cursor: pointer; user-select: none; text-align: center;
    }
    #overlay.hidden { display: none; }
    #overlay h1 { font-size: 44px; margin: 0; letter-spacing: 3px; font-weight: 800; }
    #overlay .sub { opacity: 0.78; font-size: 15px; line-height: 1.8; }
    #overlay .sub b { color: #bcd0ff; }
    #overlay .cta {
      margin-top: 8px; padding: 12px 30px; font-size: 16px;
      border: 1px solid #5b8cff; border-radius: 8px; color: #bcd0ff;
    }

    #crosshair {
      position: fixed; left: 50%; top: 50%; z-index: 5; display: none;
      width: 6px; height: 6px; margin: -3px 0 0 -3px;
      border-radius: 50%; background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
    }
    #crosshair.visible { display: block; }

    #hud {
      position: fixed; left: 12px; bottom: 10px; z-index: 5;
      color: rgba(255, 255, 255, 0.45); font: 12px ui-monospace, monospace;
    }

    #hitmarker {
      position: fixed; left: 50%; top: 50%; z-index: 6;
      transform: translate(-50%, -50%);
      font: 700 26px system-ui, sans-serif; color: #ffffff;
      opacity: 0; transition: opacity 0.12s ease-out;
      pointer-events: none; text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
    }
    #hitmarker.show { opacity: 1; transition: none; }
    #hitmarker.kill { color: #ff5252; font-size: 30px; }

    #score {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 5;
      color: rgba(255, 255, 255, 0.85); font: 600 18px ui-monospace, monospace;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }

    #health {
      position: fixed; left: 16px; bottom: 30px; z-index: 5;
      display: flex; align-items: center; gap: 9px;
      font: 700 18px ui-monospace, monospace; color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
    }
    #health .bar {
      width: 180px; height: 12px; border-radius: 6px;
      background: rgba(255, 255, 255, 0.18); overflow: hidden;
    }
    #health .fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #46d36a, #7be38f);
      transition: width 0.15s ease-out;
    }
    #health.low .fill { background: linear-gradient(90deg, #e5413a, #ff7a5c); }

    #damageflash {
      position: fixed; inset: 0; z-index: 7; pointer-events: none; opacity: 0;
      background: radial-gradient(ellipse at center,
        rgba(190, 0, 0, 0) 42%, rgba(190, 0, 0, 0.6) 100%);
    }

    #killfeed {
      position: fixed; top: 48px; left: 50%; transform: translateX(-50%); z-index: 6;
      font: 600 16px system-ui, sans-serif; color: #ffe1a8; white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
      opacity: 0; transition: opacity 0.25s ease-out; pointer-events: none;
    }
    #killfeed.show { opacity: 1; transition: none; }

    #death {
      position: fixed; inset: 0; z-index: 8; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      background: rgba(40, 0, 0, 0.35); color: #fff; pointer-events: none;
      font-family: system-ui, -apple-system, sans-serif; text-align: center;
    }
    #death.show { display: flex; }
    #death h2 { margin: 0; font-size: 40px; letter-spacing: 5px; color: #ff6b6b; }
    #death .sub { opacity: 0.85; font-size: 15px; }

    #netstatus { margin-top: 6px; font-size: 13px; opacity: 0.9; min-height: 18px; max-width: 80vw; }
    #netstatus .link {
      color: #9fd0ff; word-break: break-all; font-family: ui-monospace, monospace;
    }
    #invite {
      position: fixed; top: 12px; left: 12px; z-index: 11; display: none;
      padding: 7px 12px; border-radius: 7px; cursor: pointer;
      background: rgba(20, 28, 44, 0.85); color: #bcd0ff; border: 1px solid #3a5b9a;
      font: 600 13px system-ui, -apple-system, sans-serif;
    }
    #invite.show { display: block; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="damageflash"></div>
  <button id="invite">&#128203; Copy invite link</button>
  <div id="crosshair"></div>
  <div id="hitmarker">&#10005;</div>
  <div id="score">&#9760; 0</div>
  <div id="killfeed"></div>
  <div id="health"><span class="bar"><span class="fill"></span></span><span class="num">100</span></div>
  <div id="death"><h2>ELIMINATED</h2><div class="sub">Respawning&hellip;</div></div>
  <div id="hud"></div>
  <div id="overlay">
    <h1>FPS&#8209;EARTH</h1>
    <div class="sub">
      Phase 1 &mdash; shoot, jump, and play with anyone who joins<br />
      <b>WASD</b> move &middot; <b>Mouse</b> look &middot; <b>Click</b> shoot &middot; <b>Space</b> jump &middot; <b>Shift</b> sprint &middot; <b>Esc</b> release mouse
    </div>
    <div id="netstatus"></div>
    <div class="cta">Click anywhere to play</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
